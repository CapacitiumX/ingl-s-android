<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLingua V310 - Original Logic</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #8b5cf6; --accent: #06b6d4; --dark: #0f172a; --panel: #1e293b;
            --text: #f1f5f9; --green: #22c55e; --red: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .layout { display: flex; width: 100%; height: 100%; }
        
        /* PANEL IZQUIERDA */
        .left-panel { width: 350px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .brand { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-align: center; text-transform: uppercase; margin-bottom: 5px; }
        .config-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid #475569; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; }
        input, select { background: #0f172a; color: white; border: 1px solid #475569; padding: 8px; border-radius: 4px; width: 100%; font-size: 0.8rem; }
        button { cursor: pointer; padding: 8px; border-radius: 4px; border: none; font-weight: bold; color: white; font-size: 0.75rem; flex: 1; }
        
        .btn-green { background: var(--green); } .btn-blue { background: #3b82f6; } .btn-red { background: var(--red); }
        .btn-purple { background: var(--primary); } .btn-orange { background: #f59e0b; color: black; }

        .words-list-container { flex: 1; overflow-y: auto; background: #0f172a; border: 1px solid #334155; border-radius: 5px; padding: 5px; margin-top: 10px; }
        .list-item { padding: 8px 10px; border-bottom: 1px solid #1e293b; font-size: 0.85rem; display: flex; justify-content: space-between; cursor: pointer; }
        .list-item.active { background: var(--primary); color: white; }

        /* PANEL DERECHA */
        .right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .flashcard { width: 100%; max-width: 700px; height: 75vh; background: #1e293b; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        
        .img-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .real-img { width: 100%; height: 100%; object-fit: contain; }
        
        .info-area { padding: 20px; text-align: center; background: #1e293b; }
        .word-en { font-size: 3.5rem; font-weight: 900; margin: 0; color: white; }
        .word-es { font-size: 2rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }

        .player-bar { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .play-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--accent); color: black; font-size: 2rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; }
        .modal-box { background: var(--panel); padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="layout">
    <div class="left-panel">
        <div class="brand">NEURO LINGUA V310</div>
        
        <div class="config-box">
            <div class="row">
                <input type="text" id="filename" placeholder="Nombre lista">
                <button class="btn-green" onclick="saveList()">💾</button>
            </div>
            <div class="row">
                <select id="fileSelector"><option>-- Abrir Lista --</option></select>
                <button class="btn-blue" onclick="loadList()">📂</button>
                <button class="btn-red" style="flex:0 0 40px" onclick="deleteList()">🗑️</button>
            </div>
            <div class="row" style="margin-top:5px;">
                <input type="file" id="jsonInput" style="display:none" onchange="importJSON(this)">
                <button class="btn-purple" onclick="document.getElementById('jsonInput').click()">📤 IMPORTAR</button>
                <button class="btn-orange" onclick="generatePDF()">📄 PDF</button>
            </div>
        </div>

        <div class="config-box">
            <label style="font-size:0.7rem;">VOZ EN:</label>
            <select id="voiceEn"><option value="">Cargando...</option></select>
            <label style="font-size:0.7rem; margin-top:5px; display:block;">VOZ ES:</label>
            <select id="voiceEs"><option value="">Cargando...</option></select>
        </div>

        <div class="row">
            <button class="btn-purple" onclick="document.getElementById('modalLoad').style.display='flex'">📝 PEGAR TEXTO</button>
            <button class="btn-red" onclick="clearAll()">🧹 VACIAR</button>
        </div>

        <div id="visualList" class="words-list-container"></div>
    </div>

    <div class="right-panel">
        <div class="flashcard">
            <div class="img-area"><img id="cardImg" class="real-img" src="" alt=""></div>
            <div class="info-area">
                <h1 id="wordEn" class="word-en">...</h1>
                <div id="wordEs" class="word-es" contenteditable="true" onblur="saveEdit()">...</div>
                <div style="font-size:1rem; color:#94a3b8;">
                    <i id="sentEn">Waiting for words...</i><br>
                    <span id="sentEs">Esperando palabras...</span>
                </div>
            </div>
        </div>

        <div class="player-bar">
            <button onclick="prevCard()" style="background:none; font-size:2.5rem;">⏮️</button>
            <button class="play-btn" id="btnPlay" onclick="togglePlay()">▶</button>
            <button onclick="nextCard()" style="background:none; font-size:2.5rem;">⏭️</button>
            <select id="timerSelect" style="width:70px;"><option value="3000">3s</option><option value="5000" selected>5s</option><option value="8000">8s</option></select>
        </div>
    </div>
</div>

<div id="modalLoad" class="modal">
    <div class="modal-box">
        <h3>Cargar Palabras (Máx 1000)</h3>
        <textarea id="bulkText" style="width:100%; height:250px; background:#000; color:#fff; border:1px solid #444; padding:10px;"></textarea>
        <div class="row" style="margin-top:10px;">
            <button class="btn-red" onclick="document.getElementById('modalLoad').style.display='none'">CERRAR</button>
            <button class="btn-green" onclick="processBulk()">PROCESAR ⚡</button>
        </div>
    </div>
</div>

<script>
    let app = { fullList: [], index: 0, playing: false, timer: null, bgInterval: null };

    // --- MOTOR DE VOCES (ESTRICTO ANDROID) ---
    function initVoices() {
        const vs = window.speechSynthesis.getVoices();
        if (vs.length === 0) return;
        const e1 = document.getElementById('voiceEn'), e2 = document.getElementById('voiceEs');
        e1.innerHTML = ''; e2.innerHTML = '';
        vs.forEach((v, i) => {
            let o = document.createElement('option'); o.value = i; o.textContent = v.name;
            if (v.lang.toLowerCase().includes('en')) e1.appendChild(o.cloneNode(true));
            if (v.lang.toLowerCase().includes('es')) e2.appendChild(o.cloneNode(true));
        });
    }
    window.speechSynthesis.onvoiceschanged = initVoices;
    setInterval(() => { if(window.speechSynthesis.getVoices().length === 0) initVoices(); }, 1000);

    function speak() {
        window.speechSynthesis.cancel();
        const item = app.fullList[app.index];
        const vs = window.speechSynthesis.getVoices();
        const idxEn = document.getElementById('voiceEn').value, idxEs = document.getElementById('voiceEs').value;

        const utEn = new SpeechSynthesisUtterance(item.en);
        utEn.lang = 'en-US'; if(vs[idxEn]) utEn.voice = vs[idxEn]; utEn.rate = 0.9;
        window.speechSynthesis.speak(utEn);

        if(item.es !== "...") {
            const utEs = new SpeechSynthesisUtterance(item.es);
            utEs.lang = 'es-ES'; if(vs[idxEs]) utEs.voice = vs[idxEs];
            window.speechSynthesis.speak(utEs);
        }
    }

    // --- LOGICA CARGA ---
    function processBulk() {
        const lines = document.getElementById('bulkText').value.split('\n').filter(l => l.trim().length > 0).slice(0, 1000);
        lines.forEach(line => {
            let w = line.replace(/^\d+[\.\)\-]?\s*/, '').trim();
            if(!app.fullList.some(x => x.en === w)) {
                app.fullList.push({
                    en: w, es: "...", sentEn: "...", sentEs: "...",
                    // IMAGEN ORIGINAL SIN FILTROS DE FUTBOL
                    img: `https://tse2.mm.bing.net/th?q=${encodeURIComponent(w)}+hd+photography&w=800&h=800&c=7&rs=1`
                });
            }
        });
        document.getElementById('modalLoad').style.display = 'none';
        renderList(); updateUI(); startAutoTranslator();
    }

    function startAutoTranslator() {
        if(app.bgInterval) clearInterval(app.bgInterval);
        app.bgInterval = setInterval(async () => {
            const item = app.fullList.find(x => x.es === "...");
            if(!item) return;
            try {
                const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q=${encodeURIComponent(item.en)}`);
                const j = await r.json();
                item.es = j[0][0][0];
                item.sentEn = `The word is ${item.en}.`;
                item.sentEs = `La palabra es ${item.es}.`;
                if(app.fullList[app.index] === item) updateUI();
                renderList();
            } catch(e) {}
        }, 1200);
    }

    function updateUI() {
        if(app.fullList.length === 0) return;
        const item = app.fullList[app.index];
        document.getElementById('wordEn').innerText = item.en;
        document.getElementById('wordEs').innerText = item.es;
        document.getElementById('sentEn').innerText = item.sentEn;
        document.getElementById('sentEs').innerText = item.sentEs;
        document.getElementById('cardImg').src = item.img;
        
        document.querySelectorAll('.list-item').forEach((el, i) => {
            el.classList.toggle('active', i === app.index);
        });
    }

    function renderList() {
        const cont = document.getElementById('visualList');
        cont.innerHTML = app.fullList.map((it, i) => `
            <div class="list-item ${i === app.index ? 'active' : ''}" onclick="goTo(${i})">
                <span>${i+1}. ${it.en}</span> <span style="opacity:0.5">${it.es}</span>
            </div>
        `).join('');
    }

    function goTo(i) { app.index = i; updateUI(); speak(); }
    function nextCard() { app.index = (app.index + 1) % app.fullList.length; updateUI(); if(app.playing) speak(); }
    function prevCard() { app.index = (app.index - 1 + app.fullList.length) % app.fullList.length; updateUI(); speak(); }

    function togglePlay() {
        app.playing = !app.playing;
        document.getElementById('btnPlay').innerText = app.playing ? "⏸" : "▶";
        if(app.playing) {
            speak();
            app.timer = setInterval(nextCard, document.getElementById('timerSelect').value);
        } else clearInterval(app.timer);
    }

    function saveEdit() { app.fullList[app.index].es = document.getElementById('wordEs').innerText; renderList(); }
    function clearAll() { if(confirm("¿Borrar todo?")) { app.fullList = []; renderList(); updateUI(); } }

    // --- PERSISTENCIA ---
    function saveList() {
        const n = document.getElementById('filename').value || 'Lista';
        localStorage.setItem('NL_V3_'+n, JSON.stringify(app.fullList));
        updateSelectors(); alert("Guardado");
    }

    function loadList() {
        const k = document.getElementById('fileSelector').value;
        if(!k.startsWith('NL_V3')) return;
        app.fullList = JSON.parse(localStorage.getItem(k));
        app.index = 0; renderList(); updateUI(); startAutoTranslator();
    }

    function deleteList() {
        const k = document.getElementById('fileSelector').value;
        if(confirm("¿Borrar?")) { localStorage.removeItem(k); updateSelectors(); }
    }

    function updateSelectors() {
        const s = document.getElementById('fileSelector'); s.innerHTML = '<option>-- Abrir Lista --</option>';
        for(let i=0; i<localStorage.length; i++) {
            const k = localStorage.key(i);
            if(k.startsWith('NL_V3_')) {
                let o = document.createElement('option'); o.value = k; o.innerText = k.replace('NL_V3_',''); s.appendChild(o);
            }
        }
    }

    function importJSON(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            app.fullList = JSON.parse(e.target.result);
            renderList(); updateUI(); startAutoTranslator();
        };
        reader.readAsText(input.files[0]);
    }

    function generatePDF() {
        const doc = new window.jspdf.jsPDF();
        doc.text("NeuroLingua V3 - Vocabulario", 10, 10);
        let y = 20;
        app.fullList.forEach((it, i) => {
            if(y > 280) { doc.addPage(); y = 20; }
            doc.text(`${i+1}. ${it.en} = ${it.es}`, 10, y);
            y += 7;
        });
        doc.save("Vocabulario.pdf");
    }

    updateSelectors();
</script>
</body>
</html>
