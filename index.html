<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroLingua V310 - PRO FULL</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #8b5cf6; --accent: #06b6d4; --dark: #0f172a; --panel: #1e293b;
            --text: #f1f5f9; --green: #22c55e; --red: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .layout { display: flex; width: 100%; height: 100%; }
        
        /* PANEL IZQUIERDO */
        .left-panel { width: 350px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 15px; gap: 10px; }
        .brand { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        .config-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border: 1px solid #475569; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; }
        input, select { background: #0f172a; color: white; border: 1px solid #475569; padding: 8px; border-radius: 4px; width: 100%; font-size: 0.8rem; }
        button { cursor: pointer; padding: 8px; border-radius: 4px; border: none; font-weight: bold; color: white; font-size: 0.75rem; transition: 0.2s; flex: 1; }
        
        .btn-green { background: var(--green); } .btn-blue { background: #3b82f6; } .btn-red { background: var(--red); }
        .btn-purple { background: var(--primary); } .btn-orange { background: #f59e0b; color: black; }

        .words-list-container { flex: 1; overflow-y: auto; background: #0f172a; border: 1px solid #334155; border-radius: 5px; padding: 5px; margin-top: 10px; }
        .list-item { padding: 8px 10px; border-bottom: 1px solid #1e293b; font-size: 0.85rem; display: flex; justify-content: space-between; cursor: pointer; }
        .list-item.active { background: var(--primary); color: white; }

        /* PANEL DERECHO */
        .right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .flashcard { width: 100%; max-width: 650px; height: 75vh; background: #1e293b; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        
        .img-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .real-img { width: 100%; height: 100%; object-fit: contain; }
        
        .info-area { padding: 20px; text-align: center; background: #1e293b; }
        .word-en { font-size: 3rem; font-weight: 900; margin: 0; color: white; }
        .word-es { font-size: 1.8rem; color: var(--accent); font-weight: bold; margin-bottom: 10px; }

        .player-bar { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .play-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--accent); color: black; font-size: 2rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; }
        .modal-box { background: var(--panel); padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div class="layout">
    <div class="left-panel">
        <div class="brand">NEURO LINGUA V310</div>
        
        <div class="config-box">
            <div class="row">
                <input type="text" id="filename" placeholder="Nombre de la lista">
                <button class="btn-green" onclick="saveList()">💾</button>
            </div>
            <div class="row">
                <select id="fileSelector"><option>-- Listas Guardadas --</option></select>
                <button class="btn-blue" onclick="loadList()">📂</button>
                <button class="btn-red" style="flex:0 0 40px" onclick="deleteList()">🗑️</button>
            </div>
            <div class="row" style="margin-top:5px;">
                <input type="file" id="jsonInput" style="display:none" onchange="importJSON(this)">
                <button class="btn-purple" onclick="document.getElementById('jsonInput').click()">📤 IMPORTAR</button>
                <button class="btn-orange" onclick="generatePDF()">📄 PDF</button>
            </div>
        </div>

        <div class="config-box">
            <label style="font-size:0.7rem; color:var(--accent)">VOZ INGLÉS:</label>
            <select id="voiceEn"><option value="">Cargando voces...</option></select>
            <label style="font-size:0.7rem; color:var(--accent); margin-top:5px; display:block;">VOZ ESPAÑOL:</label>
            <select id="voiceEs"><option value="">Cargando voces...</option></select>
        </div>

        <div class="row">
            <button class="btn-purple" onclick="document.getElementById('modalLoad').style.display='flex'">📝 PEGAR LISTA</button>
            <button class="btn-red" onclick="clearAll()">🧹 VACIAR</button>
        </div>

        <div id="visualList" class="words-list-container"></div>
    </div>

    <div class="right-panel">
        <div class="flashcard">
            <div class="img-area"><img id="cardImg" class="real-img" src="https://via.placeholder.com/800x600?text=NeuroLingua" alt=""></div>
            <div class="info-area">
                <h1 id="wordEn" class="word-en">Ready?</h1>
                <div id="wordEs" class="word-es" contenteditable="true" onblur="saveEdit()">¿Listo?</div>
                <div style="font-size:0.9rem; color:#94a3b8;">
                    <i id="sentEn">Practice makes perfect.</i><br>
                    <span id="sentEs">La práctica hace al maestro.</span>
                </div>
            </div>
        </div>

        <div class="player-bar">
            <button onclick="prevCard()" style="background:none; font-size:2.5rem;">⏮️</button>
            <button class="play-btn" id="btnPlay" onclick="togglePlay()">▶</button>
            <button onclick="nextCard()" style="background:none; font-size:2.5rem;">⏭️</button>
            <select id="timerSelect" style="width:70px;"><option value="3000">3s</option><option value="5000" selected>5s</option><option value="8000">8s</option></select>
        </div>
    </div>
</div>

<div id="modalLoad" class="modal">
    <div class="modal-box">
        <h3>Pegar hasta 1000 palabras</h3>
        <textarea id="bulkText" style="width:100%; height:200px; background:#000; color:#fff; border:1px solid #444; padding:10px;" placeholder="Ejemplo:
Goal
Striker
Referee..."></textarea>
        <div class="row" style="margin-top:10px;">
            <button class="btn-red" onclick="document.getElementById('modalLoad').style.display='none'">CANCELAR</button>
            <button class="btn-green" onclick="processBulk()">CARGAR AHORA ⚡</button>
        </div>
    </div>
</div>

<script>
    let app = { fullList: [], index: 0, playing: false, timer: null, bgInterval: null };

    // --- MOTOR DE VOCES (ANDROID FIX) ---
    function initVoices() {
        const vs = window.speechSynthesis.getVoices();
        if (vs.length === 0) return;
        const e1 = document.getElementById('voiceEn');
        const e2 = document.getElementById('voiceEs');
        e1.innerHTML = ''; e2.innerHTML = '';
        vs.forEach((v, i) => {
            let o = document.createElement('option'); o.value = i; o.textContent = v.name;
            if (v.lang.toLowerCase().includes('en')) e1.appendChild(o.cloneNode(true));
            if (v.lang.toLowerCase().includes('es')) e2.appendChild(o.cloneNode(true));
        });
    }
    window.speechSynthesis.onvoiceschanged = initVoices;
    setInterval(() => { if(window.speechSynthesis.getVoices().length === 0) initVoices(); }, 1000);

    function speakDual() {
        window.speechSynthesis.cancel();
        const item = app.fullList[app.index];
        const vs = window.speechSynthesis.getVoices();
        const vEn = vs[document.getElementById('voiceEn').value];
        const vEs = vs[document.getElementById('voiceEs').value];

        const utEn = new SpeechSynthesisUtterance(item.en);
        utEn.lang = 'en-US'; if(vEn) utEn.voice = vEn; utEn.rate = 0.9;
        window.speechSynthesis.speak(utEn);

        const utPause = new SpeechSynthesisUtterance(""); utPause.duration = 0.5;
        window.speechSynthesis.speak(utPause);

        if(item.es !== "...") {
            const utEs = new SpeechSynthesisUtterance(item.es);
            utEs.lang = 'es-ES'; if(vEs) utEs.voice = vEs; utEs.rate = 1.0;
            window.speechSynthesis.speak(utEs);
        }
    }

    // --- CARGA Y TRADUCCION ---
    function processBulk() {
        const txt = document.getElementById('bulkText').value;
        const lines = txt.split('\n').filter(l => l.trim().length > 0).slice(0, 1000);
        lines.forEach(line => {
            let w = line.replace(/^\d+[\.\)\-]?\s*/, '').trim();
            if(!app.fullList.some(x => x.en === w)) {
                app.fullList.push({
                    en: w, es: "...", sentEn: "Loading...", sentEs: "...",
                    img: `https://tse2.mm.bing.net/th?q=${encodeURIComponent(w)}+football+soccer+action+hd&w=800&h=800&c=7&rs=1`
                });
            }
        });
        document.getElementById('modalLoad').style.display = 'none';
        renderList(); updateUI(); startAutoTranslator();
    }

    function startAutoTranslator() {
        if(app.bgInterval) clearInterval(app.bgInterval);
        app.bgInterval = setInterval(async () => {
            const item = app.fullList.find(x => x.es === "...");
            if(!item) { clearInterval(app.bgInterval); return; }
            try {
                const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q=${encodeURIComponent(item.en)}`);
                const j = await r.json();
                item.es = j[0][0][0];
                item.sentEn = `The ${item.en} is part of the game.`;
                item.sentEs = `El/La ${item.es} es parte del juego.`;
                if(app.fullList[app.index] === item) updateUI();
                renderList();
            } catch(e) {}
        }, 1500);
    }

    function updateUI() {
        if(app.fullList.length === 0) return;
        const item = app.fullList[app.index];
        document.getElementById('wordEn').innerText = item.en;
        document.getElementById('wordEs').innerText = item.es;
        document.getElementById('sentEn').innerText = item.sentEn;
        document.getElementById('sentEs').innerText = item.sentEs;
        document.getElementById('cardImg').src = item.img;
        
        const all = document.querySelectorAll('.list-item');
        all.forEach(el => el.classList.remove('active'));
        if(all[app.index]) {
            all[app.index].classList.add('active');
            all[app.index].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    function renderList() {
        const cont = document.getElementById('visualList');
        cont.innerHTML = app.fullList.map((it, i) => `
            <div class="list-item ${i === app.index ? 'active' : ''}" onclick="goTo(${i})">
                <span>${i+1}. ${it.en}</span><span style="opacity:0.5">${it.es}</span>
            </div>
        `).join('');
    }

    function goTo(i) { app.index = i; updateUI(); speakDual(); }

    // --- FUNCIONES DE BOTONES ---
    function togglePlay() {
        app.playing = !app.playing;
        document.getElementById('btnPlay').innerText = app.playing ? "⏸" : "▶";
        if(app.playing) {
            speakDual();
            app.timer = setInterval(nextCard, document.getElementById('timerSelect').value);
        } else { clearInterval(app.timer); window.speechSynthesis.cancel(); }
    }

    function nextCard() { app.index = (app.index + 1) % app.fullList.length; updateUI(); if(app.playing) speakDual(); }
    function prevCard() { app.index = (app.index - 1 + app.fullList.length) % app.fullList.length; updateUI(); speakDual(); }
    function saveEdit() { app.fullList[app.index].es = document.getElementById('wordEs').innerText; renderList(); }
    function clearAll() { if(confirm("¿Borrar todo?")) { app.fullList = []; renderList(); updateUI(); } }

    // --- GESTIÓN DE ARCHIVOS ---
    function saveList() {
        const name = document.getElementById('filename').value || 'MiLista';
        localStorage.setItem('NL_SAVE_' + name, JSON.stringify(app.fullList));
        updateSelectors(); alert("Guardado correctamente");
    }

    function loadList() {
        const key = document.getElementById('fileSelector').value;
        if(!key.startsWith('NL_SAVE')) return;
        app.fullList = JSON.parse(localStorage.getItem(key));
        app.index = 0; renderList(); updateUI(); startAutoTranslator();
    }

    function deleteList() {
        const key = document.getElementById('fileSelector').value;
        if(confirm("¿Borrar lista permanentemente?")) { localStorage.removeItem(key); updateSelectors(); }
    }

    function updateSelectors() {
        const sel = document.getElementById('fileSelector'); sel.innerHTML = '<option>-- Listas Guardadas --</option>';
        for(let i=0; i<localStorage.length; i++) {
            const k = localStorage.key(i);
            if(k.startsWith('NL_SAVE_')) {
                let o = document.createElement('option'); o.value = k; o.innerText = k.replace('NL_SAVE_',''); sel.appendChild(o);
            }
        }
    }

    function importJSON(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            app.fullList = JSON.parse(e.target.result).map(it => ({
                ...it, img: it.img || `https://tse2.mm.bing.net/th?q=${encodeURIComponent(it.en)}+football+hd&w=800&h=800&c=7&rs=1`
            }));
            renderList(); updateUI(); startAutoTranslator();
        };
        reader.readAsText(input.files[0]);
    }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("NeuroLingua - Lista de Vocabulario", 10, 10);
        let y = 20;
        app.fullList.forEach((it, i) => {
            if(y > 280) { doc.addPage(); y = 20; }
            doc.text(`${i+1}. ${it.en} = ${it.es}`, 10, y);
            y += 7;
        });
        doc.save("Vocabulario.pdf");
    }

    updateSelectors();
</script>
</body>
</html>
